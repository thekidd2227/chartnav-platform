name: Release

# Triggers on:
#   - push to a tag matching v*.*.* (e.g. v0.1.0, v1.2.3-rc1)
#   - manual dispatch with an explicit version string
#
# Produces a GitHub Release with:
#   - chartnav-api-<version>.tar       (docker save, importable with `docker load`)
#   - chartnav-web-<version>.tar.gz    (static bundle from apps/web/dist)
#   - MANIFEST.txt                     (git ref, sha, dates, sizes, sha256s)
#
# Additionally pushes the Docker image to GitHub Container Registry
# (ghcr.io/<owner>/chartnav-api:<version> and :latest for tag builds).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.1.0). Only for manual dispatch."
        required: true
        type: string

permissions:
  contents: write   # create the GitHub Release + upload assets
  packages: write   # push to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "==> release version: $V"

      - name: Set up Node (for web build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chartnav-api:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/chartnav-api:latest

      - name: Build local release artifacts
        run: bash scripts/release_build.sh "${{ steps.ver.outputs.version }}"

      - name: Upload release-build artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: chartnav-release-${{ steps.ver.outputs.version }}
          path: dist/release/${{ steps.ver.outputs.version }}/
          if-no-files-found: error

      - name: Create GitHub Release (tag pushes only)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ChartNav ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/release/${{ steps.ver.outputs.version }}/chartnav-api-${{ steps.ver.outputs.version }}.tar
            dist/release/${{ steps.ver.outputs.version }}/chartnav-web-${{ steps.ver.outputs.version }}.tar.gz
            dist/release/${{ steps.ver.outputs.version }}/chartnav-staging-${{ steps.ver.outputs.version }}.tar.gz
            dist/release/${{ steps.ver.outputs.version }}/MANIFEST.txt
