name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-sqlite:
    name: Backend (SQLite) — migrate · seed · test · smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Migrate (isolated CI DB)
        env:
          CI_DB_PATH: ${{ runner.temp }}/chartnav_ci.db
        run: |
          rm -f "$CI_DB_PATH"
          DATABASE_URL="sqlite:///$CI_DB_PATH" alembic upgrade head

      - name: Idempotent seed (run twice)
        env:
          CI_DB_PATH: ${{ runner.temp }}/chartnav_ci.db
        run: |
          DATABASE_URL="sqlite:///$CI_DB_PATH" python scripts_seed.py
          DATABASE_URL="sqlite:///$CI_DB_PATH" python scripts_seed.py

      - name: Unit + integration tests
        run: pytest tests/ -v

      - name: API boot smoke
        env:
          CI_DB_PATH: ${{ runner.temp }}/chartnav_ci.db
          DATABASE_URL: sqlite:///${{ runner.temp }}/chartnav_ci.db
        working-directory: ${{ github.workspace }}
        run: bash scripts/verify.sh

  backend-postgres:
    name: Backend (Postgres) — parity proof
    runs-on: ubuntu-latest
    needs: backend-sqlite

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chartnav
          POSTGRES_USER: chartnav
          POSTGRES_PASSWORD: chartnav
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U chartnav -d chartnav"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+psycopg://chartnav:chartnav@localhost:5432/chartnav
      CHARTNAV_AUTH_MODE: header

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps (incl. psycopg)
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Alembic upgrade on Postgres
        working-directory: apps/api
        run: alembic upgrade head

      - name: Seed on Postgres (twice, idempotent)
        working-directory: apps/api
        run: |
          python scripts_seed.py
          python scripts_seed.py

      - name: Boot + smoke + status-transition proof
        working-directory: ${{ github.workspace }}
        run: |
          cd apps/api && uvicorn app.main:app --host 127.0.0.1 --port 8766 --log-level warning \
              >/tmp/pg_api.log 2>&1 &
          echo $! > /tmp/pg_api.pid
          for _ in $(seq 1 40); do
            if curl -sfo /dev/null http://127.0.0.1:8766/health; then break; fi
            sleep 0.5
          done
          bash scripts/smoke.sh http://127.0.0.1:8766
          curl -sf -X POST http://127.0.0.1:8766/encounters/1/status \
              -H "Content-Type: application/json" \
              -H "X-User-Email: clin@chartnav.local" \
              -d '{"status":"draft_ready"}' \
              -o /tmp/pg_status.json
          python3 -c "import json; d=json.load(open('/tmp/pg_status.json')); assert d['status']=='draft_ready', d; print('  ok  status transition on Postgres')"
          kill "$(cat /tmp/pg_api.pid)" 2>/dev/null || true

  docker-build:
    name: Docker — production image builds
    runs-on: ubuntu-latest
    needs: backend-sqlite
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: false
          load: true
          tags: chartnav-api:ci

      - name: Smoke the built image against SQLite
        run: |
          docker run -d --rm --name chartnav-api-smoke \
              -e DATABASE_URL=sqlite:///./chartnav.db \
              -e CHARTNAV_AUTH_MODE=header \
              -e CHARTNAV_RUN_SEED=1 \
              -p 8000:8000 \
              chartnav-api:ci
          for _ in $(seq 1 40); do
            if curl -sfo /dev/null http://127.0.0.1:8000/health; then break; fi
            sleep 0.5
          done
          bash apps/api/scripts/smoke.sh http://127.0.0.1:8000
          docker rm -f chartnav-api-smoke

  frontend:
    name: Frontend — typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests (vitest)
        run: npm test
      - name: Build
        run: npm run build

  e2e:
    name: E2E — Playwright against live stack
    runs-on: ubuntu-latest
    needs: [backend-sqlite, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install backend deps
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"
      - name: Install frontend deps
        working-directory: apps/web
        run: npm ci
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Run E2E (Playwright manages backend + frontend)
        working-directory: apps/web
        env:
          CI: "1"
        run: npx playwright test --reporter=list
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          if-no-files-found: ignore

  deploy-config:
    name: Deploy config — compose + scripts validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate staging compose file
        run: |
          cp infra/docker/.env.staging.example infra/docker/.env.staging
          docker compose --env-file infra/docker/.env.staging \
            -f infra/docker/docker-compose.staging.yml config >/dev/null
          docker compose -f infra/docker/docker-compose.prod.yml config >/dev/null
          docker compose -f infra/docker/docker-compose.yml config >/dev/null
      - name: shellcheck runbook scripts
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck scripts/staging_up.sh scripts/staging_verify.sh scripts/staging_rollback.sh scripts/verify.sh scripts/pg_verify.sh scripts/release_build.sh apps/api/scripts/smoke.sh

  docs:
    name: Docs — regenerate HTML + PDF
    runs-on: ubuntu-latest
    needs: backend-sqlite
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Chromium for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Build final HTML + PDF
        env:
          CHARTNAV_PDF_BROWSER: chromium-browser
        run: python scripts/build_docs.py

      - name: Upload rebuilt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chartnav-docs-final
          path: |
            docs/final/chartnav-workflow-state-machine-build.html
            docs/final/chartnav-workflow-state-machine-build.pdf
          if-no-files-found: error
